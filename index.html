<section id="home">
    <div class="quote-Container">
        <div class="box">
            <p id="quoteText">"Loading inspiration..."</p>

<div class="Capsule-Section">
    <h2>
        <span class="emoji">🔮</span><span class="title-text">Create Your Time Capsule</span> </h2>
    <div class ="Container-form">
    <div class="group">
        <label> <span class="emoji">📝</span><span class="first">Letter Title</span> </label>
        <input type="text"id="title" placeholder="e.g , My hopes for 2026...">
    </div>
    <div class="group">
        <label>💌 Write to Your Future Self</label>
        <textarea id="text" placeholder="Dear future me !, Today I feel.... I hope.... I dream...., Making memories .."></textarea>
    </div>
    <div class="group">
        <label>☺️How are you feeling today ? </label>
        <div class="userMood-selected">
            <button type="button"class="mood-button" data-mood="happy" onclick="selectMood(this)">😊</button>
            <button type="button"class="mood-button" data-mood="sad" onclick="selectMood(this)">😓</button>
            <button type="button"class="mood-button" data-mood="excited" onclick="selectMood(this)">🤩</button>
             <button type="button"class="mood-button" data-mood="calm" onclick="selectMood(this)">😌</button>
              <button type="button"class="mood-button" data-mood="curious" onclick="selectMood(this)">🤔</button>
                <button type="button"class="mood-button" data-mood="determined" onclick="selectMood(this)">💪</button>
                 <button type="button"class="mood-button" data-mood="hopeful" onclick="selectMood(this)">✨</button>
                     <button type="button"class="mood-button" data-mood="angry" onclick="selectMood(this)">😠</button>
                     <button type="button"class="mood-button" data-mood="confident" onclick="selectMood(this)">😎</button>
                        <button type="button"class="mood-button" data-mood="lovely" onclick="selectMood(this)">🥰</button>
                        <button type="button"class="mood-button" data-mood="shy" onclick="selectMood(this)">😳</button>
                        <button type="button"class="mood-button" data-mood="celebrate" onclick="selectMood(this)">🥳</button>
                        <button type="button"class="mood-button" data-mood="headache" onclick="selectMood(this)">🤕</button>
                        <button type="button"class="mood-button" data-mood="verySad" onclick="selectMood(this)">😭</button>
        </div>
    </div>
    <div class="group">
        <label class="file-upload"for="userPhoto" >📸 Attach a Photo (Optional)</label><!--In order to make the label have the same function as input(file)The for in label should have the same name as the id -->
            <input type="file" id="userPhoto" name="image_uploads" accept="image/*"> <!-- <input type="file" id="photo-upload" name="photos" accept="image/*" multiple />HOODAA Later on add this-->
    </div>
<div class="group">
    <label>🗓️ Unlock Data</label>   <!--Hoda change the emoji later-->
   <select id="unlockTime">
     <option value="1"onclick="selectOption(this)">1 Minute from now (Test!)</option>
     <option value="7"onclick="selectOption(this)">1 week from now</option>
     <option value="30"onclick="selectOption(this)">1 Month from now</option>
       <option value="365"onclick="selectOption(this)">1 Year from now</option>
         <option value="1825"onclick="selectOption(this)">5 Year from now</option>
          <option value="3650"onclick="selectOption(this)">10 Year from now</option>
   </select>
</div>
<div class="center-btn">
<button class="finish-btn"onclick="craeteCapsule()">🪄Seal My Time Capsule</button>
</div>
</div>
